name: Mirror to GitLab

on:
  push:
    branches:
      - main

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GITLAB_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 32200 git-hztx.nie.netease.com >> ~/.ssh/known_hosts

      - name: Push to GitLab
        run: |
          git remote add gitlab ssh://git@git-hztx.nie.netease.com:32200/up1/y3-helper.git
          git push -f gitlab main